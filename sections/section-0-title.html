<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akka — Title</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
/* SHARED-CSS */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --yellow: #F5C518;
  --black:  #000;
  --dark:   #07070C;
  --white:  #fff;
  --gray:   #555;
}
html { scroll-behavior: auto; }
body {
  font-family: 'Instrument Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--black);
  color: var(--white);
  overflow-x: hidden;
}

@keyframes fadeUp  { to { opacity:1; transform:translateY(0); } }
@keyframes slideUp { to { opacity:1; transform:translateY(0); } }
@keyframes bounceDown {
  0%,100% { transform:rotate(45deg) translate(0,0); }
  50%     { transform:rotate(45deg) translate(4px,4px); }
}
@keyframes bgSlide {
  from { background-position:0 0; }
  to   { background-position:36px 36px; }
}
/* /SHARED-CSS */

/* SECTION-CSS */
#title {
  height: 100vh; min-height: 680px;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  padding: 0 8vw; position: relative; background: var(--black); overflow: hidden;
  text-align: center;
}
#title::before {
  content:''; position:absolute; inset:0;
  background-image: radial-gradient(circle, rgba(245,197,24,0.07) 1px, transparent 1px);
  background-size: 48px 48px; pointer-events: none; z-index: 0;
}
#title::after {
  content:''; position:absolute; inset:0;
  background: radial-gradient(ellipse at 50% 50%, transparent 25%, rgba(0,0,0,0.85) 75%);
  pointer-events:none; z-index:0;
}

.title-logo {
  margin-bottom: 40px;
  position: relative; z-index: 2;
  opacity:0; transform:translateY(16px);
  animation: fadeUp .6s ease forwards .3s;
}
.title-logo svg { height: 48px; width: auto; }

.title-headline {
  font-size: clamp(44px, 6.5vw, 96px); font-weight: 700;
  line-height: 1.02; letter-spacing: -0.03em; color: var(--white);
  max-width: 1000px; margin-bottom: 24px;
  position: relative; z-index: 2;
  opacity:0; transform:translateY(16px);
  animation: fadeUp .6s ease forwards .6s;
}
.title-headline .accent { color: var(--yellow); }

.title-sub {
  font-size: clamp(12px, 1.2vw, 16px);
  color: var(--gray); font-weight: 600;
  letter-spacing: 4px; line-height: 1.5;
  max-width: 600px; margin-bottom: 48px;
  position: relative; z-index: 2;
  opacity:0; transform:translateY(16px);
  animation: fadeUp .5s ease forwards .9s;
}

.title-divider {
  width: 56px; height: 3px; background: var(--yellow); margin-bottom: 40px;
  position: relative; z-index: 2;
  opacity:0;
  animation: fadeUp .5s ease forwards 1.1s;
}

.title-presenter {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  position: relative; z-index: 2;
  opacity:0; transform:translateY(16px);
  animation: fadeUp .5s ease forwards 1.2s;
}
.title-presenter a {
  color: var(--white); text-decoration: none;
  font-size: 18px; font-weight: 700; letter-spacing: -0.02em;
  display: inline-flex; align-items: center; gap: 8px;
  transition: color .2s ease;
}
.title-presenter a:hover { color: var(--yellow); }
.title-presenter a svg { width: 13px; height: 13px; fill: currentColor; flex-shrink: 0; }
.title-presenter-title {
  font-size: 12px; color: var(--gray); text-transform: uppercase;
  letter-spacing: 2px; font-weight: 600;
}

.title-scroll-hint {
  position:absolute; bottom:36px; left:0; right:0;
  display:flex; flex-direction:column; align-items:center; gap:10px; z-index:2;
  opacity:0; animation:fadeUp .5s ease forwards 1.8s;
}
.title-scroll-hint span { font-size:9px; text-transform:uppercase; letter-spacing:3px; color:var(--gray); }
.title-scroll-arrow {
  width:18px; height:18px;
  border-right:1.5px solid var(--yellow); border-bottom:1.5px solid var(--yellow);
  transform:rotate(45deg); animation:bounceDown 1.6s ease infinite;
}
/* /SECTION-CSS */
</style>
</head>
<body>

<!-- SECTION-HTML -->
<section id="title">
  <div class="title-logo">
    <svg width="109" height="25" viewBox="0 0 109 25" fill="none" xmlns="http://www.w3.org/2000/svg">
      <g clip-path="url(#t)">

        <path d="m13.78 8.287 3.485 8.123h-6.968l3.485-8.123h-.002ZM11.336.062 0 25h6.552l1.561-3.436h11.336L21.113 25h6.45L16.275.062h-4.94Z" fill="#fff"/>
        <path d="m95.22 8.287 3.484 8.123h-6.968l3.485-8.123h-.001ZM92.775.062 81.44 25h6.551l1.561-3.436h11.336L102.552 25H109L97.715.062h-4.94Z" fill="#fff"/>
        <path d="M45.283.062 36.246 10.179V.062H30.057V25h6.189V14.883l9.037 10.117h8.264L42.408 12.53 53.547.062h-8.264Z" fill="#fff"/>

  <h1 class="title-headline"><span class="accent">Reliable AI</span> for every industry.</h1>
  <div class="title-sub">AGENTIC SYSTEMS PLATFORM</div>
  <div class="title-divider"></div>

  <div class="title-presenter">
    <a href="https://www.linkedin.com/in/tylerjewell/" target="_blank">
      Tyler Jewell

    <div class="title-presenter-title">CEO, Akka</div>

  <div class="title-scroll-hint">
    <span>scroll to explore</span>
    <div class="title-scroll-arrow"></div>
  </div>
</section>
<!-- /SECTION-HTML -->

<script>

</script>
</body>
</html>
