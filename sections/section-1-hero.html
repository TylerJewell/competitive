<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akka — Section 1: Hero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
/* SHARED-CSS */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --yellow: #F5C518;
  --black:  #000;
  --dark:   #07070C;
  --white:  #fff;
  --gray:   #555;
}
html { scroll-behavior: auto; }
body {
  font-family: 'Instrument Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--black);
  color: var(--white);
  overflow-x: hidden;
}

@keyframes fadeUp  { to { opacity:1; transform:translateY(0); } }
@keyframes slideUp { to { opacity:1; transform:translateY(0); } }
@keyframes bounceDown {
  0%,100% { transform:rotate(45deg) translate(0,0); }
  50%     { transform:rotate(45deg) translate(4px,4px); }
}
@keyframes bgSlide {
  from { background-position:0 0; }
  to   { background-position:36px 36px; }
}
/* /SHARED-CSS */

/* SECTION-CSS */
#hero-wrapper {
  height: 140vh;
  position: relative;
}
#hero {
  height: 100vh; min-height: 680px;
  display: flex; flex-direction: column; justify-content: center;
  padding: 0 8vw; position: sticky; top: 0; background: var(--black); overflow: hidden;
}
#hero::before {
  content:''; position:absolute; inset:0;
  background-image: radial-gradient(circle, rgba(245,197,24,0.07) 1px, transparent 1px);
  background-size: 48px 48px; pointer-events: none; z-index: 0;
}
#hero::after {
  content:''; position:absolute; inset:0;
  background: radial-gradient(ellipse at 60% 50%, transparent 30%, rgba(0,0,0,0.85) 80%);
  pointer-events:none; z-index:0;
}
.hero-nav {
  position:absolute; top:0; left:0; right:0;
  padding:32px 8vw; display:flex; justify-content:space-between; align-items:center; z-index:2;
}
.hero-logo svg { height:30px; width:auto; }
.hero-tagline { font-size:10px; text-transform:uppercase; letter-spacing:2.5px; color:var(--gray); font-weight:500; }

.hero-body { position:relative; z-index:2; max-width:1000px; }

.hero-eyebrow {
  display:inline-flex; align-items:center; gap:10px;
  font-size:11px; text-transform:uppercase; letter-spacing:3px;
  color:var(--yellow); font-weight:600; margin-bottom:28px;
  opacity:0; transform:translateY(16px);
  animation: fadeUp .5s ease forwards .4s;
}
.hero-eyebrow::before { content:''; display:block; width:28px; height:2px; background:var(--yellow); }

.hero-headline {
  font-size: clamp(44px, 6.5vw, 96px); font-weight:700;
  line-height:1.02; letter-spacing:-0.03em; color:var(--white);
}
.hero-headline .line { display:block; overflow:hidden; padding-bottom:4px; }
.hero-headline .line-inner {
  display:block; opacity:0; transform:translateY(110%);
  animation: slideUp .75s cubic-bezier(0.16,1,0.3,1) forwards;
}
.hero-headline .line:nth-child(1) .line-inner { animation-delay:.55s; }
.hero-headline .line:nth-child(2) .line-inner { animation-delay:.68s; }
.hero-headline .line:nth-child(3) .line-inner { animation-delay:.81s; }
.hero-headline .accent { color:var(--yellow); }

.hero-divider { width:56px; height:3px; background:var(--yellow); margin:32px 0; opacity:0; animation:fadeUp .5s ease forwards 1.1s; }

.hero-stats { display:flex; gap:52px; flex-wrap:wrap; opacity:0; animation:fadeUp .6s ease forwards 1.25s; }
.hero-stat-number { font-size:38px; font-weight:700; color:var(--white); letter-spacing:-0.03em; line-height:1; display:flex; align-items:baseline; }
.hero-stat-number .suffix { color:var(--yellow); font-size:28px; }
.hero-stat-label { font-size:11px; color:var(--gray); text-transform:uppercase; letter-spacing:1.5px; margin-top:6px; font-weight:500; }

.hero-scroll-hint {
  position:absolute; bottom:36px; left:50%; transform:translateX(-50%);
  display:flex; flex-direction:column; align-items:center; gap:10px; z-index:2;
  opacity:0; animation:fadeUp .5s ease forwards 2s;
}
.hero-scroll-hint span { font-size:9px; text-transform:uppercase; letter-spacing:3px; color:var(--gray); }
.scroll-arrow {
  width:18px; height:18px;
  border-right:1.5px solid var(--yellow); border-bottom:1.5px solid var(--yellow);
  transform:rotate(45deg); animation:bounceDown 1.6s ease infinite;
}
/* /SECTION-CSS */
</style>
</head>
<body>

<!-- SECTION-HTML -->
<div id="hero-wrapper">
<section id="hero">
  <div class="hero-body">
    <div class="hero-eyebrow">Est. 2007 &mdash; 18 years of production reliability</div>
    <h1 class="hero-headline">
      <span class="line"><span class="line-inner">The runtime making</span></span>
      <span class="line"><span class="line-inner">the world&rsquo;s most complex</span></span>
      <span class="line"><span class="line-inner">systems <span class="accent">reliable.</span></span></span>
    </h1>
    <div class="hero-divider"></div>
    <div class="hero-stats">
      <div>
        <div class="hero-stat-number"><span class="stat-num" data-target="100">0</span><span class="suffix">K+</span></div>
        <div class="hero-stat-label">Production deployments</div>
      </div>
      <div>
        <div class="hero-stat-number"><span class="stat-num" data-target="2">0</span><span class="suffix">B+</span></div>
        <div class="hero-stat-label">People rely on Akka daily</div>
      </div>
      <div>
        <div class="hero-stat-number"><span class="stat-num" data-target="52">0</span></div>
        <div class="hero-stat-label">Banks running in production</div>
      </div>
      <div>
        <div class="hero-stat-number"><span class="stat-num" data-target="19">0</span><span class="suffix">+</span></div>
        <div class="hero-stat-label">Compliance certifications</div>
      </div>
    </div>
  </div>

</section>
</div>
<!-- /SECTION-HTML -->

<script>
/* SECTION-JS */
/* ── Hero counters ─────────────────────────────────── */
function animateCount(el, target) {
  const dur = 1600, t0 = performance.now();
  (function tick(now) {
    const p = Math.min((now - t0) / dur, 1);
    el.textContent = Math.floor((1 - Math.pow(1 - p, 3)) * target);
    if (p < 1) requestAnimationFrame(tick); else el.textContent = target;
  })(t0);
}
new IntersectionObserver(entries => {
  if (entries[0].isIntersecting)
    document.querySelectorAll('.stat-num').forEach(el => animateCount(el, +el.dataset.target));
}, { threshold: 0.6 }).observe(document.querySelector('.hero-stats'));
/* /SECTION-JS */
</script>
</body>
</html>
