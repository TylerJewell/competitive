<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akka — Section 6: Resilience</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
/* SHARED-CSS */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --yellow: #F5C518;
  --black:  #000;
  --dark:   #07070C;
  --white:  #fff;
  --gray:   #555;
}
html { scroll-behavior: auto; }
body {
  font-family: 'Instrument Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--black);
  color: var(--white);
  overflow-x: hidden;
}

@keyframes fadeUp  { to { opacity:1; transform:translateY(0); } }
@keyframes slideUp { to { opacity:1; transform:translateY(0); } }
@keyframes bounceDown {
  0%,100% { transform:rotate(45deg) translate(0,0); }
  50%     { transform:rotate(45deg) translate(4px,4px); }
}
@keyframes bgSlide {
  from { background-position:0 0; }
  to   { background-position:36px 36px; }
}
/* /SHARED-CSS */

/* SECTION-CSS */
#s6-wrapper {
  height: 140vh;
  position: relative;
}
#s6 {
  background: var(--black);
  position: sticky;
  top: 0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  padding: 36px 6vw 24px;
  overflow: hidden;
}
#s6::before {
  content:''; position:absolute; inset:0;
  background-image: radial-gradient(circle, rgba(245,197,24,0.03) 1px, transparent 1px);
  background-size: 48px 48px; pointer-events:none; z-index:0;
}

.s6-reveal {
  opacity: 0; transform: translateY(24px);
  transition: opacity .6s ease, transform .6s cubic-bezier(0.16,1,0.3,1);
  position: relative; z-index: 1;
}
.s6-reveal.visible { opacity: 1; transform: none; }

.s6-top {
  display: flex; justify-content: space-between; align-items: flex-end;
  margin-bottom: 20px; gap: 40px; flex-shrink: 0;
}
.s6-top-left { flex: 1; }

.s6-eyebrow {
  font-size:11px; text-transform:uppercase; letter-spacing:3px;
  color:var(--yellow); font-weight:600; margin-bottom:10px;
}
.s6-eyebrow::before { content:''; display:inline-block; width:28px; height:2px; background:var(--yellow); margin-right:10px; vertical-align:middle; }

.s6-headline {
  font-size: clamp(26px, 3.5vw, 50px); font-weight:700;
  line-height:1.08; letter-spacing:-0.03em; color:var(--white);
  max-width: 800px;
}
.s6-headline .accent { color:var(--yellow); }

/* Stats row */
.s6-stats {
  display: flex; gap: 36px; flex-shrink: 0;
}
.s6-stat { text-align: center; }
.s6-stat-num {
  font-size: clamp(22px, 2.5vw, 36px); font-weight: 700; color: var(--yellow);
  letter-spacing: -0.03em; line-height: 1;
}
.s6-stat-label {
  font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 1.5px;
  margin-top: 4px; font-weight: 500;
}

/* Iframe container — fills remaining space */
.s6-frame-wrap {
  flex: 1; min-height: 0;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid #1C1C1C;
  box-shadow: 0 24px 80px rgba(0,0,0,0.6);
}
.s6-frame-wrap iframe {
  width: 119%;     /* 1 / 0.84 */
  height: 119%;
  border: none;
  display: block;
  transform: scale(0.84);
  transform-origin: top left;
}

@media (max-width: 900px) {
  .s6-top { flex-direction: column; align-items: flex-start; }
  .s6-stats { gap: 20px; }
}
/* /SECTION-CSS */
</style>
</head>
<body>

<!-- SECTION-HTML -->
<div style="height:30vh;background:var(--black)"></div>
<div id="s6-wrapper">
<section id="s6">
  <div class="s6-top">
    <div class="s6-top-left">
      <div class="s6-eyebrow s6-reveal">Resilience built in</div>
      <div class="s6-headline s6-reveal">Agentic AI that <span class="accent">never goes down.</span></div>
    </div>
    <div class="s6-stats s6-reveal">
      <div class="s6-stat">
        <div class="s6-stat-num">6&times;9s</div>
        <div class="s6-stat-label">Availability</div>
      </div>
      <div class="s6-stat">
        <div class="s6-stat-num">&lt;10ms</div>
        <div class="s6-stat-label">Memory access</div>
      </div>
      <div class="s6-stat">
        <div class="s6-stat-num">Millions</div>
        <div class="s6-stat-label">Concurrent txns</div>
      </div>
    </div>
  </div>

  <div class="s6-frame-wrap s6-reveal">
    <iframe src="../resilience.html" loading="lazy"></iframe>
  </div>
</section>
</div>
<!-- /SECTION-HTML -->

<script>
/* SECTION-JS */
(function() {
  var revObs = new IntersectionObserver(function(entries) {
    entries.forEach(function(e) {
      if (e.isIntersecting) e.target.classList.add('visible');
    });
  }, { threshold: 0.15 });
  document.querySelectorAll('#s6 .s6-reveal').forEach(function(el) { revObs.observe(el); });
})();
/* /SECTION-JS */
</script>
</body>
</html>
