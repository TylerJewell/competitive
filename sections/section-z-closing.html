<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Akka — Closing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
/* SHARED-CSS */
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --yellow: #F5C518;
  --black:  #000;
  --dark:   #07070C;
  --white:  #fff;
  --gray:   #555;
}
html { scroll-behavior: auto; }
body {
  font-family: 'Instrument Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--black);
  color: var(--white);
  overflow-x: hidden;
}

@keyframes fadeUp  { to { opacity:1; transform:translateY(0); } }
@keyframes slideUp { to { opacity:1; transform:translateY(0); } }
@keyframes bounceDown {
  0%,100% { transform:rotate(45deg) translate(0,0); }
  50%     { transform:rotate(45deg) translate(4px,4px); }
}
@keyframes bgSlide {
  from { background-position:0 0; }
  to   { background-position:36px 36px; }
}
/* /SHARED-CSS */

/* SECTION-CSS */
#closing {
  height: 100vh; min-height: 680px;
  display: flex; flex-direction: column; justify-content: center; align-items: center;
  padding: 0 8vw; position: relative; background: var(--black); overflow: hidden;
  text-align: center;
}
#closing::before {
  content:''; position:absolute; inset:0;
  background-image: radial-gradient(circle, rgba(245,197,24,0.07) 1px, transparent 1px);
  background-size: 48px 48px; pointer-events: none; z-index: 0;
}
#closing::after {
  content:''; position:absolute; inset:0;
  background: radial-gradient(ellipse at 50% 50%, transparent 25%, rgba(0,0,0,0.85) 75%);
  pointer-events:none; z-index:0;
}

.closing-reveal {
  opacity: 0; transform: translateY(24px);
  transition: opacity .6s ease, transform .6s cubic-bezier(0.16,1,0.3,1);
  position: relative; z-index: 2;
}
.closing-reveal.visible { opacity: 1; transform: none; }

.closing-logo {
  margin-bottom: 40px;
}
.closing-logo svg { height: 48px; width: auto; }

.closing-headline {
  font-size: clamp(44px, 6.5vw, 96px); font-weight: 700;
  line-height: 1.02; letter-spacing: -0.03em; color: var(--white);
  max-width: 1000px; margin-bottom: 24px;
}
.closing-headline .accent { color: var(--yellow); }

.closing-sub {
  font-size: clamp(12px, 1.2vw, 16px);
  color: var(--gray); font-weight: 600;
  letter-spacing: 4px; line-height: 1.5;
  max-width: 600px; margin-bottom: 48px;
}

.closing-divider {
  width: 56px; height: 3px; background: var(--yellow); margin-bottom: 40px;
}

.closing-stats {
  display: flex; gap: 52px; flex-wrap: wrap; justify-content: center;
  margin-bottom: 48px;
}
.closing-stat-number {
  font-size: 38px; font-weight: 700; color: var(--white);
  letter-spacing: -0.03em; line-height: 1;
  display: flex; align-items: baseline; justify-content: center;
}
.closing-stat-number .suffix { color: var(--yellow); font-size: 28px; }
.closing-stat-label {
  font-size: 11px; color: var(--gray); text-transform: uppercase;
  letter-spacing: 1.5px; margin-top: 6px; font-weight: 500;
}

.closing-cta {
  display: inline-flex; align-items: center; gap: 10px;
  padding: 14px 32px;
  background: var(--yellow); color: var(--black);
  font-size: 14px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 2px; border-radius: 6px;
  text-decoration: none;
  transition: background .2s ease;
  margin-bottom: 32px;
}
.closing-cta:hover { background: #e0b416; }

/* /SECTION-CSS */
</style>
</head>
<body>

<!-- SECTION-HTML -->
<section id="closing">
  <div class="closing-logo closing-reveal">
    <svg width="109" height="25" viewBox="0 0 109 25" fill="none" xmlns="http://www.w3.org/2000/svg">
      <g clip-path="url(#c)">
        <path d="M72.158 0 63.105 10.133V0h-6.199v24.98h6.199V14.847l9.053 10.133h8.277L69.277 12.49 80.435 0h-8.277Z" fill="#fff"/>
        <path d="m13.78 8.287 3.485 8.123h-6.968l3.485-8.123h-.002ZM11.336.062 0 25h6.552l1.561-3.436h11.336L21.113 25h6.45L16.275.062h-4.94Z" fill="#fff"/>
        <path d="m95.22 8.287 3.484 8.123h-6.968l3.485-8.123h-.001ZM92.775.062 81.44 25h6.551l1.561-3.436h11.336L102.552 25H109L97.715.062h-4.94Z" fill="#fff"/>
        <path d="M45.283.062 36.246 10.179V.062H30.057V25h6.189V14.883l9.037 10.117h8.264L42.408 12.53 53.547.062h-8.264Z" fill="#fff"/>
      </g>
      <defs><clipPath id="c"><rect width="109" height="25" fill="#fff"/></clipPath></defs>
    </svg>
  </div>

  <h1 class="closing-headline closing-reveal"><span class="accent">Reliable AI</span> for every industry.</h1>
  <div class="closing-sub closing-reveal">AGENTIC SYSTEMS PLATFORM</div>
  <div class="closing-divider closing-reveal"></div>

  <a href="https://akka.io" class="closing-cta closing-reveal">Get started &rarr;</a>
</section>
<!-- /SECTION-HTML -->

<script>
/* SECTION-JS */
const closingObserver = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) e.target.classList.add('visible');
  });
}, { threshold: 0.15 });
document.querySelectorAll('#closing .closing-reveal').forEach(el => closingObserver.observe(el));
/* /SECTION-JS */
</script>
</body>
</html>
